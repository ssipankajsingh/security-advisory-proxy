services:
  - type: web
    name: security-advisory-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SENDGRID_API_KEY
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: TEAMS_WEBHOOK
        sync: false
      - key: DIGEST_EMAIL
        sync: false
